<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        AI Blog & Presentation Prompt Generator
    </title>

    <link rel="stylesheet"
          href="style.css">
</head>

<body>

<div class="container">

    <h1>
        AI Blog/Presentation Prompt Generator
    </h1>

    <div class="form-group">

        <label>Topic</label>

        <input
                type="text"
                id="topic"
                placeholder="Example: Artificial Intelligence">
    </div>

    <div class="form-group">

        <label>Audience</label>

        <select id="audience">

            <option>Students</option>
            <option>Developers</option>
            <option>Business Executives</option>
            <option>Investors</option>
            <option>Beginners</option>

        </select>

    </div>

    <div class="form-group">

        <label>Tone</label>

        <select id="tone">

            <option>Professional</option>
            <option>Technical</option>
            <option>Academic</option>
            <option>Conversational</option>
            <option>Persuasive</option>

        </select>

    </div>

    <div class="form-group">

        <label>Format</label>

        <select id="format">

            <option value="blog">
                Blog
            </option>

            <option value="presentation">
                Presentation
            </option>

        </select>

    </div>

    <div class="form-group">

        <label>
            Word Count / Slides
        </label>

        <input
                type="number"
                id="length"
                value="10">
    </div>

    <button onclick="generatePrompt()">
        Generate Prompt
    </button>

    <button onclick="copyPrompt()"
            class="copy-btn">
        Copy Prompt
    </button>

    <textarea
            id="output"
            readonly
            placeholder="Generated prompt will appear here...">
    </textarea>

</div>

<script src="script.js"></script>

</body>
</html>
