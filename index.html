!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Domain Prompt Booklet Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="hero">
        <h1>📘 AI Domain Prompt Booklet Generator</h1>
        <p>
            Generate professional AI prompt libraries for any industry
            such as BFSI, Healthcare, Retail, Manufacturing and Telecom.
        </p>
    </div>

    <div class="form-card">

        <h2>Domain Information</h2>

        <div class="form-grid">

            <div class="input-group">
                <label>🏢 Industry Domain</label>
                <input
                    type="text"
                    id="domain"
                    placeholder="BFSI, Healthcare, Retail..."
                >
            </div>

            <div class="input-group">
                <label>🏛 Company Name</label>
                <input
                    type="text"
                    id="company"
                    placeholder="ABC Bank"
                >
            </div>

            <div class="input-group">
                <label>🎯 Target Audience</label>
                <input
                    type="text"
                    id="audience"
                    placeholder="Retail Customers"
                >
            </div>

            <div class="input-group">
                <label>🌍 Market Region</label>
                <input
                    type="text"
                    id="region"
                    placeholder="India"
                >
            </div>

            <div class="input-group">
                <label>📊 Prompt Count</label>
                <select id="promptCount">
                    <option value="5">5 Prompts</option>
                    <option value="10" selected>10 Prompts</option>
                    <option value="15">15 Prompts</option>
                </select>
            </div>

        </div>

        <div class="btn-section">
            <button id="generateBtn">
                🚀 Generate Booklet
            </button>

            <button id="downloadBtn">
                📥 Download Booklet
            </button>
        </div>

    </div>

    <!-- OUTPUT SECTION -->

    <div class="output-section">

        <h2>
            📚 Generated Prompt Booklet
        </h2>

        <div id="booklet"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
